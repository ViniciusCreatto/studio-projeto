<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="design-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ui-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#design-gradient)"/>
  
  <!-- UI Mockup -->
  <g transform="translate(200, 100)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="200" height="400" rx="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    
    <!-- Screen -->
    <rect x="15" y="60" width="170" height="320" rx="15" fill="rgba(255,255,255,0.95)"/>
    
    <!-- Status bar -->
    <rect x="15" y="60" width="170" height="25" rx="15" fill="url(#ui-gradient)"/>
    
    <!-- UI Elements -->
    <rect x="30" y="100" width="140" height="40" rx="8" fill="rgba(79, 172, 254, 0.3)"/>
    <rect x="30" y="150" width="140" height="40" rx="8" fill="rgba(79, 172, 254, 0.2)"/>
    <rect x="30" y="200" width="140" height="80" rx="8" fill="rgba(79, 172, 254, 0.4)"/>
    <circle cx="100" cy="320" r="25" fill="url(#ui-gradient)"/>
    
    <!-- Home button -->
    <circle cx="100" cy="380" r="8" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- Desktop mockup -->
  <g transform="translate(450, 150)">
    <!-- Monitor -->
    <rect x="0" y="0" width="280" height="200" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- Screen -->
    <rect x="10" y="10" width="260" height="160" rx="5" fill="rgba(255,255,255,0.95)"/>
    
    <!-- Browser UI -->
    <rect x="10" y="10" width="260" height="25" rx="5" fill="url(#ui-gradient)"/>
    
    <!-- Content areas -->
    <rect x="20" y="45" width="240" height="30" rx="5" fill="rgba(79, 172, 254, 0.3)"/>
    <rect x="20" y="85" width="110" height="60" rx="5" fill="rgba(79, 172, 254, 0.4)"/>
    <rect x="140" y="85" width="120" height="60" rx="5" fill="rgba(79, 172, 254, 0.2)"/>
    
    <!-- Stand -->
    <rect x="130" y="200" width="20" height="30" fill="rgba(255,255,255,0.2)"/>
    <rect x="100" y="230" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Design elements -->
  <g opacity="0.3">
    <circle cx="100" cy="150" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="700" cy="450" r="50" fill="rgba(255,255,255,0.15)"/>
    <rect x="50" y="400" width="80" height="80" rx="15" fill="rgba(255,255,255,0.2)"/>
    <rect x="650" y="50" width="60" height="60" rx="10" fill="rgba(255,255,255,0.25)"/>
  </g>
  
  <!-- Floating design tools -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
    <rect x="50" y="10" width="40" height="40" rx="8" fill="rgba(255,255,255,0.15)"/>
    <rect x="25" y="60" width="40" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M300 300 Q400 250 500 300" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none"/>
  <path d="M350 200 L450 250" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
</svg>
