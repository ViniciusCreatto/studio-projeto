<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tech-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="code-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#tech-gradient)"/>
  
  <!-- Abstract tech elements -->
  <g opacity="0.1">
    <rect x="50" y="50" width="200" height="150" rx="10" fill="white"/>
    <rect x="550" y="100" width="180" height="120" rx="10" fill="white"/>
    <rect x="300" y="400" width="220" height="140" rx="10" fill="white"/>
  </g>
  
  <!-- Code representation -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="600" height="300" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- Code lines -->
    <rect x="20" y="30" width="400" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="50" width="350" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="70" width="450" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="90" width="300" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="20" y="110" width="480" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="130" width="320" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="20" y="150" width="400" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="170" width="360" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="190" width="420" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="210" width="280" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="20" y="230" width="460" height="8" rx="4" fill="url(#code-gradient)"/>
    <rect x="20" y="250" width="340" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- Floating elements -->
  <circle cx="150" cy="100" r="30" fill="rgba(255,255,255,0.2)"/>
  <circle cx="650" cy="500" r="40" fill="rgba(255,255,255,0.15)"/>
  <circle cx="700" cy="80" r="25" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Tech icons representation -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="rgba(255,255,255,0.2)"/>
    <rect x="80" y="0" width="60" height="60" rx="10" fill="rgba(255,255,255,0.15)"/>
    <rect x="160" y="0" width="60" height="60" rx="10" fill="rgba(255,255,255,0.2)"/>
    <rect x="240" y="0" width="60" height="60" rx="10" fill="rgba(255,255,255,0.1)"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M150 100 L300 200 L450 150 L600 250" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M100 300 L250 350 L400 320 L550 380" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
</svg>
