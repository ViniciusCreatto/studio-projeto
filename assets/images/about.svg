<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="team-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#team-gradient)"/>
  
  <!-- Team members silhouettes -->
  <g transform="translate(100, 100)">
    <!-- Person 1 -->
    <g>
      <circle cx="50" cy="50" r="25" fill="rgba(255,255,255,0.8)"/>
      <ellipse cx="50" cy="120" rx="35" ry="60" fill="rgba(255,255,255,0.8)"/>
    </g>
    
    <!-- Person 2 -->
    <g transform="translate(150, 20)">
      <circle cx="50" cy="50" r="25" fill="rgba(255,255,255,0.7)"/>
      <ellipse cx="50" cy="120" rx="35" ry="60" fill="rgba(255,255,255,0.7)"/>
    </g>
    
    <!-- Person 3 -->
    <g transform="translate(300, 0)">
      <circle cx="50" cy="50" r="25" fill="rgba(255,255,255,0.9)"/>
      <ellipse cx="50" cy="120" rx="35" ry="60" fill="rgba(255,255,255,0.9)"/>
    </g>
  </g>
  
  <!-- Office elements -->
  <g opacity="0.3">
    <rect x="50" y="50" width="80" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
    <rect x="470" y="80" width="80" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
    <rect x="260" y="320" width="80" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
  </g>
  
  <!-- Collaboration elements -->
  <g transform="translate(200, 250)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="100" cy="0" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="50" cy="-30" r="40" fill="rgba(255,255,255,0.2)"/>
    <path d="M0 0 L100 0 L50 -30 Z" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Floating ideas -->
  <g opacity="0.4">
    <circle cx="150" cy="50" r="15" fill="rgba(255,255,255,0.3)"/>
    <circle cx="450" cy="100" r="20" fill="rgba(255,255,255,0.25)"/>
    <circle cx="500" cy="300" r="18" fill="rgba(255,255,255,0.35)"/>
    <circle cx="80" cy="280" r="22" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M200 150 Q300 100 400 150" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M150 250 L250 220 L350 250" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
</svg>
